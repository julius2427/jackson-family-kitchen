<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f7f3ec" />
<title>This Week's Kitchen</title>
<style>
  :root {
    --bg: #f7f3ec;
    --card: #ffffff;
    --ink: #2b2420;
    --muted: #7a6f65;
    --accent: #b8532a;
    --accent-soft: #f2e4d8;
    --pantry-good: #4a7a4a;
    --pantry-missing: #b8532a;
    --shadow: 0 2px 10px rgba(43, 36, 32, 0.06);
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 18px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  header .dates {
    color: var(--muted);
    font-size: 15px;
  }
  header .updated {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
    font-variant: small-caps;
    letter-spacing: 0.05em;
  }

  .meals {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .meal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }

  .meal .day {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .meal .day-name {
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .meal .day-date {
    font-size: 13px;
    color: var(--muted);
  }

  .meal h2 {
    margin: 0 0 6px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .meal .desc {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 14px;
  }

  .ingredients {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 14px;
  }
  .ingredients li {
    display: flex;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(43, 36, 32, 0.06);
    gap: 8px;
  }
  .ingredients li:last-child { border-bottom: none; }

  /* checkbox styling */
  .ingredients input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    min-width: 16px;
    border: 1.5px solid var(--pantry-missing);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    background: #fff;
    transition: background 0.15s, border-color 0.15s;
  }
  .ingredients input[type="checkbox"]:checked {
    background: var(--pantry-missing);
    border-color: var(--pantry-missing);
  }
  .ingredients input[type="checkbox"]:checked::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 1px;
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }
  .ingredients li.have input[type="checkbox"] {
    border-color: var(--pantry-good);
  }

  .ingredients .name { display: flex; align-items: center; gap: 8px; flex: 1; }
  .ingredients .dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .ingredients .dot.have { background: var(--pantry-good); }
  .ingredients .dot.need { background: var(--pantry-missing); }
  .ingredients .amount { color: var(--muted); font-size: 13px; white-space: nowrap; }

  /* cart row at the bottom of each meal card */
  .cart-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .btn-cart {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-cart:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .btn-cart:not(:disabled):hover { opacity: 0.88; }
  .btn-reset {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  .btn-reset:hover { color: var(--ink); }
  .cart-status {
    font-size: 13px;
    color: var(--muted);
    margin-left: 2px;
  }
  .cart-status.ok  { color: var(--pantry-good); }
  .cart-status.err { color: var(--pantry-missing); }

  .shopping {
    margin-top: 34px;
    background: var(--accent-soft);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .shopping h3 {
    margin: 0 0 10px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .shopping ul {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 15px;
  }
  .shopping li {
    padding: 5px 0;
    display: flex;
    justify-content: space-between;
  }
  .shopping li .for { color: var(--muted); font-size: 12px; }
  .shopping .empty { color: var(--muted); font-style: italic; font-size: 14px; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 15px;
  }

  @media (max-width: 480px) {
    .wrap { padding: 18px 14px 40px; }
    header h1 { font-size: 24px; }
    .meal { padding: 16px; }
    .meal h2 { font-size: 18px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>This Week's Kitchen</h1>
      <div class="dates" id="dates">Loading…</div>
      <div class="updated" id="updated"></div>
    </header>

    <div id="content">
      <div class="empty-state">Loading this week's menu…</div>
    </div>
  </div>

<script>
(async function () {
  const content  = document.getElementById("content");
  const datesEl  = document.getElementById("dates");
  const updatedEl = document.getElementById("updated");

  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function fmtUpdated(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return "updated " + d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
           " at " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  }

  let data;
  try {
    const res = await fetch("data/current_week.json?v=" + Date.now());
    if (!res.ok) throw new Error("not ok");
    data = await res.json();
  } catch (e) {
    content.innerHTML = '<div class="empty-state">No menu available yet. Check back after the next kitchen scan.</div>';
    return;
  }

  datesEl.textContent  = fmtDate(data.week_start) + " — " + fmtDate(data.week_end);
  updatedEl.textContent = fmtUpdated(data.generated_at);

  const webhookUrl = data.cart_webhook_url || "";

  // ── Build meal cards ─────────────────────────────────────────────────────
  const mealEls = (data.meals || []).map((m, mealIdx) => {
    const needItems = (m.ingredients || []).filter(i => !i.in_pantry);
    const haveItems = (m.ingredients || []).filter(i =>  i.in_pantry);

    const ingHtml = [
      // "Need" items get a checkbox, checked by default
      ...needItems.map((i, k) => `
        <li class="need">
          <input type="checkbox" id="cb-${mealIdx}-${k}" checked
            data-name="${esc(i.name)}"
            data-amount="${esc(i.amount || "")}"
            data-upc="${esc(i.kroger_upc || "")}"
            data-product="${esc(i.kroger_product_name || "")}"
            data-price="${esc(String(i.kroger_price || ""))}"
          />
          <span class="name">
            <span class="dot need"></span>${esc(i.name)}
          </span>
          <span class="amount">${esc(i.amount || "")}</span>
        </li>`),
      // "Have" items are plain — no checkbox needed
      ...haveItems.map(i => `
        <li class="have">
          <span class="name">
            <span class="dot have"></span>${esc(i.name)}
          </span>
          <span class="amount">${esc(i.amount || "")}</span>
        </li>`),
    ].join("");

    // Show the cart row only if there are need-items and a webhook is configured
    const cartRow = (needItems.length && webhookUrl) ? `
      <div class="cart-row" id="cart-row-${mealIdx}">
        <button class="btn-cart" id="btn-cart-${mealIdx}">
          Add <span id="ct-${mealIdx}">${needItems.length}</span> to Kroger list
        </button>
        <button class="btn-reset" id="btn-reset-${mealIdx}">reset</button>
        <span class="cart-status" id="cart-status-${mealIdx}"></span>
      </div>` : "";

    return `
      <div class="meal" id="meal-${mealIdx}">
        <div class="day">
          <span class="day-name">${esc(m.day)}</span>
          <span class="day-date">${fmtDate(m.date)}</span>
        </div>
        <h2>${esc(m.name)}</h2>
        ${m.description ? `<p class="desc">${esc(m.description)}</p>` : ""}
        <ul class="ingredients" id="ing-${mealIdx}">${ingHtml}</ul>
        ${cartRow}
      </div>`;
  });

  // ── Shopping list ────────────────────────────────────────────────────────
  const shop = data.shopping_list || [];
  const shoppingHtml = `
    <div class="shopping">
      <h3>Need from the store</h3>
      ${shop.length
        ? `<ul>${shop.map(s => `
            <li>
              <span>${esc(s.name)}${s.amount ? " — " + esc(s.amount) : ""}</span>
              <span class="for">${(s.for_meals || []).join(", ")}</span>
            </li>`).join("")}</ul>`
        : `<div class="empty">Nothing — we've got everything on hand.</div>`}
    </div>`;

  content.innerHTML = `<div class="meals">${mealEls.join("")}</div>${shoppingHtml}`;

  // ── Wire up checkbox + button logic ──────────────────────────────────────
  (data.meals || []).forEach((m, mealIdx) => {
    const needItems = (m.ingredients || []).filter(i => !i.in_pantry);
    if (!needItems.length || !webhookUrl) return;

    const ingList   = document.getElementById(`ing-${mealIdx}`);
    const btn       = document.getElementById(`btn-cart-${mealIdx}`);
    const ctSpan    = document.getElementById(`ct-${mealIdx}`);
    const resetBtn  = document.getElementById(`btn-reset-${mealIdx}`);
    const statusEl  = document.getElementById(`cart-status-${mealIdx}`);

    function getChecked() {
      return [...ingList.querySelectorAll("input[type=checkbox]:checked")];
    }

    function updateCount() {
      const n = getChecked().length;
      ctSpan.textContent = n;
      btn.disabled = n === 0;
    }

    ingList.addEventListener("change", updateCount);

    resetBtn.addEventListener("click", () => {
      ingList.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = true);
      statusEl.textContent = "";
      statusEl.className = "cart-status";
      updateCount();
    });

    btn.addEventListener("click", async () => {
      const checked = getChecked();
      if (!checked.length) return;

      const items = checked.map(cb => ({
        name:         cb.dataset.name,
        amount:       cb.dataset.amount,
        upc:          cb.dataset.upc,
        product_name: cb.dataset.product,
        price:        cb.dataset.price ? parseFloat(cb.dataset.price) : "",
      }));

      btn.disabled = true;
      statusEl.textContent = "Adding…";
      statusEl.className = "cart-status";

      try {
        const res = await fetch(webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ day: m.day, recipe: m.name, items }),
        });
        const json = await res.json();
        if (json.ok) {
          statusEl.textContent = `✓ ${items.length} item${items.length !== 1 ? "s" : ""} added`;
          statusEl.className = "cart-status ok";
          // Uncheck added items so re-clicking doesn't double-add
          checked.forEach(cb => { cb.checked = false; });
          updateCount();
        } else {
          throw new Error(json.error || "unknown error");
        }
      } catch (err) {
        statusEl.textContent = "Failed — try again";
        statusEl.className = "cart-status err";
        btn.disabled = false;
      }
    });
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
})();
</script>
</body>
</html>
